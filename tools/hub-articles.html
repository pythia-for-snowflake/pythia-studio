<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🗞️ Articles — pythia-studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--accent:#7056d7;--hover:#f3f0ff;--border:#e0e0e0;--muted:#bbb;--text:#1a1a1a;--bg:#f5f5f5}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;padding:48px 24px 80px;display:flex;flex-direction:column;align-items:center}

.hdr{display:flex;align-items:center;gap:12px;margin-bottom:6px}
h1{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--accent);letter-spacing:-.03em}
.back{font-size:11px;color:var(--muted);margin-bottom:40px;text-decoration:none}
.back:hover{color:var(--accent)}

.sec{font-size:10px;letter-spacing:.14em;color:var(--muted);text-transform:uppercase;margin:32px 0 14px;width:100%;max-width:680px}

.articles{display:flex;flex-direction:column;gap:16px;width:100%;max-width:680px}

.preview-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;text-decoration:none;color:inherit;display:flex;transition:all .15s;cursor:pointer}
.preview-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(112,86,215,.1);transform:translateY(-1px)}

.preview-img{width:160px;min-width:160px;background:#f0f0f0;object-fit:cover;display:block}
.preview-img-placeholder{width:160px;min-width:160px;background:linear-gradient(135deg,#f0eeff,#e8e0ff);display:flex;align-items:center;justify-content:center;font-size:36px}

.preview-body{padding:18px 20px;display:flex;flex-direction:column;gap:8px;flex:1;min-width:0}
.preview-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;background:#fff8e1;color:#e6a817;letter-spacing:.05em;align-self:flex-start}
.preview-title{font-family:'Syne',sans-serif;font-size:14px;font-weight:800;line-height:1.4;color:var(--text)}
.preview-desc{font-size:11px;color:var(--muted);line-height:1.6;flex:1;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.preview-meta{font-size:10px;color:var(--muted);margin-top:4px}
.preview-arrow{font-size:11px;color:var(--accent);align-self:flex-end}

.loading{font-size:11px;color:var(--muted);font-style:italic}

footer{margin-top:64px;font-size:10px;color:var(--muted);text-align:center;line-height:1.8}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--accent)}

@media(max-width:520px){
  .preview-img,.preview-img-placeholder{display:none}
}
</style>
</head>
<body>

<div class="hdr"><span style="font-size:24px">🗞️</span><h1>Articles</h1></div>
<a class="back" href="../index.html">← back to pythia-studio</a>

<div class="sec">Security &amp; Access Control</div>
<div class="articles" id="security"></div>

<div class="sec">Data Quality</div>
<div class="articles" id="quality"></div>

<div class="sec">Cost &amp; Pricing</div>
<div class="articles" id="cost"></div>

<div class="sec">Architecture Validation</div>
<div class="articles" id="arch"></div>

<div class="sec">Distribution &amp; Ecosystem</div>
<div class="articles" id="distrib"></div>

<footer>
  part of the <a href="../index.html">pythia-for-snowflake</a> suite &nbsp;·&nbsp; MIT
</footer>

<script>
// Replace with your Gist raw URL:
// https://gist.githubusercontent.com/{user}/{id}/raw/articles.json
const GIST_RAW_URL = 'https://gist.githubusercontent.com/gcwxfcchvz-source/f1b86f55e7ec008146c56417cc342815/raw/articles.json';

const SECTIONS = ['security','quality','cost','arch','distrib'];

async function fetchPreview(url) {
  try {
    const res = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}&timeout=6000`);
    const json = await res.json();
    if (json.status === 'success') return json.data;
  } catch(e) {}
  return null;
}

function renderCard(a, data) {
  const title = data?.title || a.title;
  const desc  = data?.description || a.desc;
  const img   = data?.image?.url || null;
  return `
    <a class="preview-card" href="${a.url}" target="_blank">
      ${img
        ? `<img class="preview-img" src="${img}" alt="" loading="lazy" onerror="this.outerHTML='<div class=preview-img-placeholder>📝</div>'">`
        : `<div class="preview-img-placeholder">📝</div>`}
      <div class="preview-body">
        <span class="preview-tag">${a.tag}</span>
        <div class="preview-title">${title}</div>
        <div class="preview-desc">${desc}</div>
        <div class="preview-meta">${a.author}</div>
        <span class="preview-arrow">read →</span>
      </div>
    </a>`;
}

async function init() {
  const res = await fetch(GIST_RAW_URL);
  const articles = await res.json();

  for (const sectionId of SECTIONS) {
    const container = document.getElementById(sectionId);
    if (!container) continue;
    const items = articles.filter(a => a.section === sectionId);
    if (!items.length) { container.innerHTML = ''; continue; }
    container.innerHTML = '<span class="loading">loading previews…</span>';
    const cards = await Promise.all(items.map(async a => {
      const data = await fetchPreview(a.url);
      return renderCard(a, data);
    }));
    container.innerHTML = cards.join('');
  }
}

init();
</script>
</body>
</html>
